about:
  eyebrow: Veteran-Owned · Mission-Driven · Solution-Proven
  hero_heading: Veteran-Owned.<br/><em>Mission-Driven.</em> Solution-Proven.
  body: "PRIME Federal Solutions was founded on a simple belief: the tech is the
    easy part. What matters is partnership, integrity, and delivery that earns
    trust. We are SBA-certified Service-Disabled Veteran-Owned Small Business
    (SDVOSB), and we've been delivering AI and federal technology solutions
    since 2020 — before the GenAI hype. We don't just sell tech; we solve with
    it. We know how to SERVE."
  cta_primary: Get in Touch
  cta_secondary: Trusted AI Manifesto
trusted_ai:
  eyebrow: Mission-Ready AI Starts With Trust
  hero_heading: Trusted AI.<br/><em>Proven,</em> Not Promised.
  body_p1: Trust is not automatic. It begins with our very first discussion. It
    must be earned through security, safety, transparency, and human
    accountability. PRIME Federal Solutions has codified 13 commitments that
    define how AI should operate in the real world — not in theory, or high
    level governance but at the infrastructure and agent-system level where
    execution happens at machine speed.
  body_p2: We are proudly Veteran-owned, mission-minded, and solution-ready. There
    are no compromises in this pursuit of trust.
  cta_primary: Review the Manifesto
  cta_secondary: Contact PRIME
federal_solutions:
