# Decap CMS config
backend:
  name: git-gateway
  branch: main

media_folder: assets
public_folder: /assets

site_url: https://prime-federal.netlify.app
display_url: https://prime-federal.netlify.app

collections:
  - name: site_content
    label: Site Content
    files:
      - label: Site Content
        name: site_content
        file: _cms/content.yml
        fields:
          - label: Home
            name: home
            widget: object
            collapsed: false
            fields:
              - { label: Site Tagline, name: site_tagline, widget: string }
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Hero Heading (HTML ok), name: hero_heading, widget: string }
              - { label: Hero Paragraph 1, name: hero_p1, widget: text }
              - { label: Hero Paragraph 2, name: hero_p2, widget: text }
              - { label: Primary CTA, name: cta_primary, widget: string }
              - { label: Secondary CTA, name: cta_secondary, widget: string }
              - { label: Proof Items (comma-separated), name: proof_items, widget: text }
              - { label: Stat 1 Number, name: stat1_number, widget: string }
              - { label: Stat 1 Label, name: stat1_label, widget: string }
              - { label: Stat 2 Number, name: stat2_number, widget: string }
              - { label: Stat 2 Label, name: stat2_label, widget: string }
              - { label: Stat 3 Number, name: stat3_number, widget: string }
              - { label: Stat 3 Label, name: stat3_label, widget: string }
              - { label: Stat 4 Number, name: stat4_number, widget: string }
              - { label: Stat 4 Label, name: stat4_label, widget: string }
              - { label: Alert Tag, name: alert_tag, widget: string }
              - { label: Alert Quote, name: alert_quote, widget: string }
              - { label: Alert Citation, name: alert_cite, widget: string }
              - { label: Alert CTA Text, name: alert_cta, widget: text }

          - label: About
            name: about
            widget: object
            collapsed: true
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Hero Heading (HTML ok), name: hero_heading, widget: string }
              - { label: Body, name: body, widget: text }
              - { label: Primary CTA, name: cta_primary, widget: string }
              - { label: Secondary CTA, name: cta_secondary, widget: string }

          - label: Trusted AI
            name: trusted_ai
            widget: object
            collapsed: true
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Hero Heading (HTML ok), name: hero_heading, widget: string }
              - { label: Body Paragraph 1, name: body_p1, widget: text }
              - { label: Body Paragraph 2, name: body_p2, widget: text }
              - { label: Primary CTA, name: cta_primary, widget: string }
              - { label: Secondary CTA, name: cta_secondary, widget: string }

          - label: Federal Solutions
            name: federal_solutions
            widget: object
            collapsed: true
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Hero Heading (HTML ok), name: hero_heading, widget: string }
              - { label: Body, name: body, widget: text }
              - { label: Primary CTA, name: cta_primary, widget: string }
              - { label: Secondary CTA, name: cta_secondary, widget: string }
              - { label: Proof Items (comma-separated), name: proof_items, widget: text }

          - label: Commercial Solutions
            name: commercial_solutions
            widget: object
            collapsed: true
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Hero Heading, name: hero_heading, widget: string }
              - { label: Body, name: body, widget: text }
              - { label: Primary CTA, name: cta_primary, widget: string }
              - { label: Secondary CTA, name: cta_secondary, widget: string }
              - { label: Alert Tag, name: alert_tag, widget: string }
              - { label: Alert Quote, name: alert_quote, widget: string }
              - { label: Alert Citation, name: alert_cite, widget: string }
              - { label: Alert Body, name: alert_body, widget: text }

          - label: Contact
            name: contact
            widget: object
            collapsed: true
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Hero Heading, name: hero_heading, widget: string }
              - { label: Body, name: body, widget: text }
              - { label: Primary CTA, name: cta_primary, widget: string }
              - { label: Secondary CTA, name: cta_secondary, widget: string }
              - { label: Contact Email, name: email, widget: string }
